<script>
const resultTotall=document.querySelector('.resultTotall');

const resultT=document.querySelector('.resultT');

const getIconMap = () => JSON.parse(localStorage.getItem("iconMap")) || {
  "️◯":"...",
  "●":"...",
  "✕":"...",
  "🕔":"...",
  "☆":"...",
  "$":"...",
  "📝":"..."
};

const saveIconMap = (m) =>
  localStorage.setItem("iconMap", JSON.stringify(m));
function iconName(icon){
  const map = getIconMap();
  return map[icon] || icon;
}



let currentDate = new Date();
let noteKey = null;
function getDefaultRange() {
  const today = new Date();

  const start = new Date(today.getFullYear(), today.getMonth(), 1);
  const end = new Date(today);

  return {
    start: start.toISOString().split("T")[0],
    end: end.toISOString().split("T")[0]
  };
}
/* DATA */
const getData = () => JSON.parse(localStorage.getItem("calendarData")) || {};
const saveData = d => localStorage.setItem("calendarData", JSON.stringify(d));

const getAmount = () => Number(localStorage.getItem("amountPerCheck")) || '2000';
const saveAmount = v => localStorage.setItem("amountPerCheck", v);


const getRedAmount = () =>
  Number(localStorage.getItem("redDefaultAmount")) || '100';

const saveRedAmount = v =>
  localStorage.setItem("redDefaultAmount", v);


const saveInterval = (s,e)=>{
  localStorage.setItem("intervalStart", s);
  localStorage.setItem("intervalEnd", e);
};

function formatKey(y,m,d){
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

/* CLOSE MENU */
function closeMenu(){
  document.querySelectorAll(".menu").forEach(m=>m.remove());
}

document.addEventListener("click", e=>{
  if(!e.target.closest(".date")) closeMenu();
});

document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeMenu();
});

/* TOTAL */


function updateTotal(){
  const data = getData();
  const amount = getAmount();
let autoRedTotal = 0;
let customRedTotal = 0;
  const startVal = startDate.value;
  const endVal = endDate.value;

  const def = getDefaultRange();
  
  const start = startVal ? new Date(startVal) : new Date(def.start);
  const end = endVal ? new Date(endVal) : new Date(def.end);

  
  let totalVal = 0;
let redTotalVal = 0;

  for(const key in data){

    if(data[key] !== "◯") continue;
    if(
  key.startsWith("custom_") ||
  key.startsWith("note_") ||
  key.startsWith("strawberry_") ||
  key.startsWith("clock_") ||
  key.startsWith("star_")
) continue;

    const [y,m,d] = key.split("-").map(Number);
    const date = new Date(y,m-1,d);

    if(date >= start && date <= end){
      totalVal +=
        data["custom_" + key] ??
        data["auto_" + key] ??
        amount;
    }
  }


for (const key in data) {
  if (!key.startsWith("strawberryAmount_")) continue;

  const baseKey = key.replace("strawberryAmount_", "");

  const [y, m, d] = baseKey.split("-").map(Number);
  if (!y || !m || !d) continue;

  const date = new Date(y, m - 1, d);

  if (date < start || date > end) continue;

  const value = Number(data[key]) || '';

  const isAuto = data["strawberryAuto_" + baseKey] === true;

  if (isAuto) {
    autoRedTotal += value;
  } else {
    customRedTotal += value;
  }
}

/*

  total.textContent = "M total : " + totalVal + " DA";
  
*/
  
  resultTotall.innerHTML =`

  
    
    
      <div> Result : ${totalVal-(autoRedTotal + customRedTotal)} DA</div>
    
    
`
resultT.innerHTML =`
<div class="T_V_R">
   <div  class="T_V"> Total_V : ${totalVal} DA</div>
           
             <br>
  <div class="T_R"> Total_R : ${autoRedTotal + customRedTotal} DA</div>
    </div>     
`

}

/* CALENDAR */
function renderCalendar(){
  dates.innerHTML="";

  const y=currentDate.getFullYear();
  const m=currentDate.getMonth();

  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();

  const today=new Date(); today.setHours(0,0,0,0);
  const data=getData();

  const months=["Janvier","Février","Mars","Avril","Mai","Juin",
  "Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

  monthYear.textContent=months[m]+" "+y;

  // samedi = premier jour de la semaine
  let offset = (first === 6) ? 0 : first + 1;
  
  for (let i = 0; i < offset; i++) {
    dates.innerHTML += "<div></div>";
  }

  for(let d=1;d<=last;d++){
    
    const key=formatKey(y,m,d);
    const div = document.createElement("div");
    div.className = "date";
    
    const dateObj = new Date(y, m, d);
    if (dateObj.getTime() === today.getTime()) {
  div.classList.add("today");
}
const isFriday = dateObj.getDay() === 5; // الجمعة = 5
    
    if (isFriday) {
      div.classList.add("friday");
    }
    const state = data[key];
    
    
    
    
 if (state === "◯") {
   const hasCustom = data["custom_" + key];
 
   if (hasCustom) {
     div.classList.add("custom-success");
   } else {
     div.classList.add("success");
   }
 }
    
    if (state === "✕") {
      div.classList.add("cross");
    }

    const hasNote=data["note_"+key];
    const hasStraw=data["strawberry_"+key];
    const hasClock = data["clock_" + key];
    const hasStar = data["star_" + key];

  function handleIcon(icon) {

    // ✔ success / fail
   if (icon === "◯") {
   
     if (data[key] === "◯") {
   
       delete data[key];
       delete data["auto_" + key];
       delete data["custom_" + key];
   
     } else {
   
       data[key] = "◯";
       data["auto_" + key] = Number(getAmount());
   
     }
   }
   
   if (icon === "✕") {
   
     if (data[key] === "✕") {
       delete data[key];
     } else {
       data[key] = "✕";
     }
   }

    // ✔ toggle important (●)
    if (icon === "●") {
      if (data["strawberry_" + key]) {

        delete data["strawberryAmount_" + key];
        delete data["strawberryAuto_" + key];

        data["strawberry_" + key] = true;
        data["strawberryAmount_" + key] = getRedAmount();
        data["strawberryAuto_" + key] = true;
      }

    // ✔ note
    if (icon === "📝") {
      openNote(key);
      closeMenu();
      return;
    }

    // ✔ clock
    if (icon === "🕔") {
      const k = "clock_" + key;
    
      if (data[k]) {
        delete data[k];
      } else {
        data[k] = true;
      }
    }

    // ✔ star
    if (icon === "☆") {
      const k = "star_" + key;
    
      if (data[k]) {
        delete data[k];
      } else {
        data[k] = true;
      }
    }

    // ✔ delete day data
    if (icon === "🗑") {
      delete data[key];
      delete data["strawberry_" + key];
      delete data["strawberryAmount_" + key];
      delete data["strawberryAuto_" + key];
      delete data["clock_" + key];
      delete data["star_" + key];
      delete data["note_" + key];
      delete data["auto_" + key];
    }

// $ = فقط علامة بدون أي علاقة بالمبالغ
if (icon === "$") {
  const k = "flag_" + key;

  if (data[k]) {
    delete data[k];
  } else {
    data[k] = true;
  }
}

   

    save();
    closeMenu();
  }

  function render() {
    menu.innerHTML = "";

    const list = showMore ? [...baseIcons, ...moreIcons] : baseIcons;

    list.forEach(icon => {
      const span = document.createElement("span");
      span.textContent = icon;

      let longPress = false;
      let timer;

      // CLICK
      span.onclick = (e) => {
        if (longPress) return;
        e.preventDefault();
        handleIcon(icon);
      };

      // LONG PRESS (mobile)
      span.ontouchstart = span.onmousedown = () => {
        longPress = false;
        timer = setTimeout(() => {
          longPress = true;



// long press on ◯ → custom amount (like strawberry)
if (icon === "◯") {
  const old = data["custom_" + key] ?? "";
  const v = prompt("Montant personnalisé pour ce jour ?", old);

  if (v === null) return;

  } else {

  }

  save();

}
          // long press on ● → edit amount
          if (icon === "●") {
            const old = data["strawberryAmount_" + key] ?? "";
            const v = prompt("Montant personnalisé ?", old);

            if (v === null) return;

            if (v.trim() === "") {
              data["strawberryAmount_" + key] = getRedAmount();
              data["strawberryAuto_" + key] = true;
            } else {
              data["strawberryAmount_" + key] = Number(v);
              delete data["strawberryAuto_" + key];
            }

            save();
            closeMenu();
          }

        }, 600);
      };

      span.ontouchend = span.onmouseup = () => {
        clearTimeout(timer);
      };

      menu.appendChild(span);
    });

    // more button
    const more = document.createElement("span");
    more.textContent = showMore ? "⇦" : "...";
    more.style.fontWeight = "bold";

    more.onclick = (e) => {

    };

  }

  render();

  menu.onclick = e => e.stopPropagation();

  menu.style.display = "flex";
  menu.style.flexWrap = "wrap";
  menu.style.justifyContent = "center";
}

function isInSelectedRange(key) {

  const startVal = startDate.value;
  const endVal = endDate.value;

  const def = getDefaultRange();

  const start = startVal ? new Date(startVal) : new Date(def.start);
  const end = endVal ? new Date(endVal) : new Date(def.end);

  // تجاهل المفاتيح الخاصة
 let dateKey = key
   .replace("note_", "")
   .replace("custom_", "")
   .replace("strawberry_", "")
   .replace("clock_", "")
   .replace("star_", "")
   .replace("flag_", ""); // ✔ هذا هو الحل

  const [y, m, d] = dateKey.split("-").map(Number);

  if (!y || !m || !d) return false;

  const date = new Date(y, m - 1, d);

  return date >= start && date <= end;
  
}

        { type: "application/json" }
    );

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "localStorage-backup.json";
    a.click();
}
function importLocalStorage(event) {
    const file = event.target.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        const data = JSON.parse(e.target.result);

        for (let key in data) {
            localStorage.setItem(key, data[key]);
        }

        alert("تم الاسترجاع بنجاح");
    };

    reader.readAsText(file);
}




function clearLocalStorage() {
if (confirm("Delete ALL data ?")) {

  renderCalendar();

}
}

function setPassword() {

  let current = localStorage.getItem("appPassword");

  if (current) {

    if (confirm("حذف الرمز السري ؟")) {
      localStorage.removeItem("appPassword");
      alert("تم حذف الحماية");
    }

    return;
  }

  const pass = prompt("أدخل رمز سري :");

  if (!pass || pass.trim() === "") return;

  localStorage.setItem("appPassword", pass);

  alert("تم تفعيل الحماية");
}

function checkPassword() {

  const saved = localStorage.getItem("appPassword");

  if (!saved) return true;

  const entered = prompt("🔒 أدخل الرمز السري");

  if (entered === saved) {
    return true;
  }

  document.body.innerHTML = `
    <div style="
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:40px;
      color:red;
    ">
      Accès refusé
    </div>
  `;

  return false;
}

   INIT
========================= */

if (checkPassword()) {
  renderCalendar();

}






let touchStartX = 0;
let touchEndX = 0;

const calendarElement = document.querySelector(".calendar");

calendarElement.addEventListener("touchstart", (e) => {
  touchStartX = e.changedTouches[0].screenX;
});

calendarElement.addEventListener("touchend", (e) => {
  touchEndX = e.changedTouches[0].screenX;

  const diff = touchEndX - touchStartX;

  // الحد الأدنى لمسافة السحب
  if (Math.abs(diff) < 50) return;

  if (diff < 0) {
    // سحب لليسار → الشهر التالي
    changeMonth(1);
  } else {
    // سحب لليمين → الشهر السابق
    changeMonth(-1);
  }
});







function storageInfo() {

  let total = 0;

  for (let i = 0; i < localStorage.length; i++) {

    const key = localStorage.key(i);
    const value = localStorage.getItem(key);

    total += key.length + value.length;
  }

  const bytes = total * 2;
  const kb = (bytes / 1024).toFixed(2);
  const mb = (bytes / (1024 * 1024)).toFixed(3);

  const limit = 5 * 1024 * 1024;
  const percent = ((bytes / limit) * 100).toFixed(2);

  alert(
    `Utilisé : ${kb} KB\n` +
    `(${mb} MB)\n\n` +
    `Pourcentage : ${percent}%`
  );
}
